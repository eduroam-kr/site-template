    valid_until: "2028-04-21"
    download: "/assets/certs/sandbox_radius.pem"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - .ruby-version
